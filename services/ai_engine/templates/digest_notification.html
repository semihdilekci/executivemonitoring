<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ digest_title }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Arial,Helvetica,sans-serif;color:#18181b;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#ffffff;border-radius:8px;padding:32px;">
          <tr>
            <td>
              <p style="margin:0 0 8px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#71717a;">
                YıldızHolding Global Intelligence Platform
              </p>
              <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;color:#18181b;">
                Yeni bülten hazır
              </h1>
              <h2 style="margin:0 0 16px;font-size:18px;font-weight:600;color:#27272a;">
                {{ digest_title }}
              </h2>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#3f3f46;">
                {{ teaser }}
              </p>
              <a href="{{ digest_url }}"
                 style="display:inline-block;background-color:#18181b;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:12px 20px;border-radius:6px;">
                Raporu Görüntüle
              </a>
              <p style="margin:24px 0 0;font-size:13px;line-height:1.5;color:#71717a;">
                Tam raporu platformda görüntüleyebilirsiniz. Bu e-posta yalnızca özet içerir.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
